name: favorme_flutter
description: FavorMe Android MVP Flutter client.
publish_to: "none"
version: 0.2.1+3

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  # 用持久化目录而不是 systemTemp 存 device id，重装 app 后再生成时能落在稳定位置。
  path_provider: ^2.1.5
  # iOS identifierForVendor / Android 设备硬件信息（见 device_id_store.dart 的回退链）。
  device_info_plus: ^11.2.0
  # Settings.Secure.ANDROID_ID：Android 上重装 app 不变，恢复出厂设置才会换。
  android_id: ^0.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
