# 本地开发依赖。应用配置见 `backend/.env`（可从 `backend/.env.example` 复制）
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: favorme
      POSTGRES_PASSWORD: favorme
      POSTGRES_DB: favorme
    ports:
      - "5432:5432"
    volumes:
      - favorme_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  favorme_pgdata:
